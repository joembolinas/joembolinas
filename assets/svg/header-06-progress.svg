<svg width="880" height="44" viewBox="0 0 880 44"
     xmlns="http://www.w3.org/2000/svg">
  <style>
    text{font-family:'JetBrains Mono','Fira Code',Consolas,'SFMono-Regular',Menlo,monospace; font-weight:700;}
    .cursor{animation:blink 1s steps(1) infinite;}
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
  </style>
  <rect width="880" height="44" fill="transparent"/>
  <line x1="2" y1="41" x2="878" y2="41" stroke="#39FF14" stroke-opacity="0.35" stroke-width="1.5"/>
  <clipPath id="reveal">
    <rect x="0" y="0" height="44" width="0">
      <animate attributeName="width"
        values="0;245;245;0;0"
        keyTimes="0;0.420;0.620;0.920;1"
        dur="5.5s" repeatCount="indefinite"/>
    </rect>
  </clipPath>
  <g clip-path="url(#reveal)">
    <text x="14" y="28.46" font-size="19" fill="#39FF14">&gt; watch -n 1 progress</text>
  </g>
  <rect class="cursor" x="257" y="10.6" width="9.5" height="18.05" fill="#39FF14"/>
</svg>