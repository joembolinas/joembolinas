<svg width="880" height="40" viewBox="0 0 880 40"
     xmlns="http://www.w3.org/2000/svg">
  <style>
    text{font-family:'JetBrains Mono','Fira Code',Consolas,'SFMono-Regular',Menlo,monospace; font-weight:700;}
    .cursor{animation:blink 1s steps(1) infinite;}
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
  </style>
  <rect width="880" height="40" fill="transparent"/>
  <line x1="2" y1="37" x2="878" y2="37" stroke="#39FF14" stroke-opacity="0.35" stroke-width="1.5"/>
  <clipPath id="reveal">
    <rect x="0" y="0" height="40" width="0">
      <animate attributeName="width"
        values="0;668;668;0;0"
        keyTimes="0;0.420;0.620;0.920;1"
        dur="7s" repeatCount="indefinite"/>
    </rect>
  </clipPath>
  <g clip-path="url(#reveal)">
    <text x="14" y="25.44" font-size="16" fill="#39FF14">&gt; IT Student | Operations Professional | Future Cybersecurity Analyst</text>
  </g>
  <rect class="cursor" x="680" y="10.4" width="8.0" height="15.2" fill="#39FF14"/>
</svg>